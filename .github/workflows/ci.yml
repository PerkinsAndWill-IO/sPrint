name: CI

on:
  push:
    branches: [main]
    paths: ['app/**']
  pull_request:
    branches: [main]
    paths: ['app/**']

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        # continue-on-error: there are 57 pre-existing type errors that existed before CI was
        # introduced. This step still runs and reports failures, but won't block PRs until the
        # pre-existing issues are resolved.
        continue-on-error: true
        run: pnpm typecheck

      - name: Test
        run: pnpm test -- --run
